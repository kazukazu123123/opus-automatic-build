name: Build Opus (Windows via Ubuntu)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Opus version to build (e.g. 1.6.1). Leave empty to auto-detect latest."
        required: false
        default: ""
      force:
        description: "Build even if a release for that version already exists."
        type: boolean
        default: false
  schedule:
    # Weekly check for new upstream Opus tags (Mondays 00:00 UTC).
    # GitHub API only — no load on xiph.org.
    - cron: "0 0 * * 1"

permissions:
  contents: write
  actions: read

jobs:
  # ------------------------------------------------------------
  # Detect the latest stable Opus version and decide whether to
  # build. This only queries the GitHub API for xiph/opus tags,
  # so the daily schedule never touches downloads.xiph.org.
  # ------------------------------------------------------------
  check:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.detect.outputs.version }}
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - name: Detect version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION}" ]; then
            # Strip an optional leading "v" so both forms are accepted.
            VERSION="${INPUT_VERSION#v}"
            echo "Using manually requested version: ${VERSION}"
          else
            # Latest stable tag from xiph/opus (exclude alpha/beta/rc).
            VERSION=$(gh api repos/xiph/opus/tags --paginate \
              --jq '.[].name' \
              | grep -E '^v[0-9]+(\.[0-9]+)*$' \
              | sed 's/^v//' \
              | sort -V \
              | tail -n1)
            echo "Latest upstream stable version: ${VERSION}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "Could not determine a version." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Skip if we already published this version (unless forced).
          if [ "${FORCE}" = "true" ]; then
            echo "Force build requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists. Nothing to do."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v${VERSION} — will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    env:
      OPUS_VERSION: ${{ needs.check.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf libtool \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            gcc-mingw-w64-i686 g++-mingw-w64-i686 pkg-config zip wget \
            mingw-w64-tools llvm

      - name: Download and Extract Opus
        run: |
          wget https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz
          tar -xzf opus-${{ env.OPUS_VERSION }}.tar.gz

      # ------------------------
      # Build for x86 (i686)
      # ------------------------
      - name: Build Opus for x86 (i686)
        run: |
          cd opus-${{ env.OPUS_VERSION }}
          ./configure --disable-intrinsics --host=i686-w64-mingw32 --disable-asm \
                      --prefix=/ --disable-rtcd --disable-extra-programs --disable-stack-protector \
                      --disable-static --enable-shared \
                      LDFLAGS="-static-libgcc"
          sed -i 's/-D_FORTIFY_SOURCE=2//g' Makefile
          make -j$(nproc)
          make install DESTDIR=$(pwd)/build/i686

      - name: Package x86 ZIP
        run: |
          cd opus-${{ env.OPUS_VERSION }}
          mkdir -p package_i686/bin package_i686/lib_x86 package_i686/include
          cp build/i686/bin/libopus-0.dll package_i686/bin/
          cp build/i686/lib/libopus.dll.a package_i686/lib_x86/
          cp -r build/i686/include/* package_i686/include/ || true

          # MSVC-compatible import library (.lib) generated from the DLL.
          gendef package_i686/bin/libopus-0.dll
          llvm-dlltool -m i386 -D libopus-0.dll \
                       -d libopus-0.def -l package_i686/lib_x86/libopus.lib

          ZIP_NAME="opus-windows-i686-${{ env.OPUS_VERSION }}.zip"
          cd package_i686 && zip -r ../../$ZIP_NAME .
          echo "I686_ARCHIVE=$ZIP_NAME" >> $GITHUB_ENV

      # ------------------------
      # Build for x64 (x86_64)
      # ------------------------
      - name: Build Opus for x64 (x86_64)
        run: |
          cd opus-${{ env.OPUS_VERSION }}
          make distclean
          ./configure --disable-intrinsics --host=x86_64-w64-mingw32 --disable-asm \
                      --prefix=/ --disable-rtcd --disable-extra-programs --disable-stack-protector \
                      --disable-static --enable-shared \
                      LDFLAGS="-static-libgcc"
          sed -i 's/-D_FORTIFY_SOURCE=2//g' Makefile
          make -j$(nproc)
          make install DESTDIR=$(pwd)/build/x86_64

      - name: Package x64 ZIP
        run: |
          cd opus-${{ env.OPUS_VERSION }}
          mkdir -p package_x86_64/bin package_x86_64/lib_x64 package_x86_64/include
          cp build/x86_64/bin/libopus-0.dll package_x86_64/bin/
          cp build/x86_64/lib/libopus.dll.a package_x86_64/lib_x64/
          cp -r build/x86_64/include/* package_x86_64/include/ || true

          # MSVC-compatible import library (.lib) generated from the DLL.
          gendef package_x86_64/bin/libopus-0.dll
          llvm-dlltool -m i386:x86-64 -D libopus-0.dll \
                       -d libopus-0.def -l package_x86_64/lib_x64/libopus.lib

          ZIP_NAME="opus-windows-x86_64-${{ env.OPUS_VERSION }}.zip"
          cd package_x86_64 && zip -r ../../$ZIP_NAME .
          echo "X86_64_ARCHIVE=$ZIP_NAME" >> $GITHUB_ENV

      # ------------------------
      # GitHub Release
      # ------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.OPUS_VERSION }}"
          name: Opus ${{ env.OPUS_VERSION }} - Windows DLL Binaries
          body: |
            Windows DLL binaries for Opus ${{ env.OPUS_VERSION }}
            Built with MinGW-w64 on Ubuntu.
          files: |
            ${{ env.I686_ARCHIVE }}
            ${{ env.X86_64_ARCHIVE }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
